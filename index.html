<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="description" content="像素壁纸 - 免费高清壁纸浏览与下载，支持多种分类与暗色模式">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="color-scheme" content="light dark">
  <meta name="format-detection" content="telephone=no">

  <title>像素壁纸 - 免费高清壁纸</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230071e3'/%3E%3Cpath d='M8 20l6-14 4 8 6-6' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">

  <!-- 预加载数据 -->
  <link rel="preload" href="data.json" as="fetch" crossorigin="anonymous">

</head>
<body>

  <!-- ========== 顶部导航栏 ========== -->
  <header class="navbar">
    <div class="nav-inner">
      <a href="#/" class="nav-logo" aria-label="像素壁纸首页">
        <div class="nav-logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <span>像素壁纸</span>
      </a>

      <div class="search-bar" id="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          class="search-input"
          id="search-input"
          placeholder="搜索壁纸、标签..."
          aria-label="搜索壁纸"
          autocomplete="off"
        >
      </div>

      <div class="nav-actions">
        <button class="theme-toggle" id="theme-toggle" title="切换暗色模式" aria-label="切换暗色模式" onclick="ThemeManager.toggle()">
          <svg class="icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ========== 分类导航栏 ========== -->
  <nav class="category-bar" id="category-bar">
    <div class="category-inner" id="category-bar-inner">
      <!-- 由 JS 动态渲染 -->
    </div>
  </nav>

  <!-- ========== 主内容区 ========== -->
  <main class="main-content" id="main-content">

    <!-- 首页：壁纸列表 -->
    <div id="home-container">
      <div class="wallpaper-grid" id="wallpaper-grid">
        <!-- 由 JS 动态渲染 -->
      </div>
    </div>

    <!-- 详情页 -->
    <div id="detail-container" style="display:none;">
      <!-- 由 JS 动态渲染 -->
    </div>

  </main>

  <!-- ========== 页脚 ========== -->
  <footer class="footer">
    <p>&copy; 2026 像素壁纸 · 所有壁纸均来自免费图源，仅供个人使用 ·
      <a href="https://picsum.photos" target="_blank" rel="noopener">picsum.photos</a>
    </p>
  </footer>

  <!-- ========== JavaScript 模块 ========== -->
  <!-- 注意：加载顺序必须严格 -->
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/data.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
